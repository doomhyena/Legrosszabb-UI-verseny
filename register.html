<head>
    <title>Legrosszabb UI verseny</title>    
    <meta charset="UTF-8">
</head>
<body>
    <style>
        body {
            background: linear-gradient(45deg, #dc143c, #b22222, #8b0000 );
            font-family: Comic Sans MS, Papyrus, cursive;
            text-align: center;
            animation: villog 0.3s infinite;
        }

        .doboz {
            margin-top: 100px;
            padding: 20px;
            border: 5px dashed  #800000;
            background-color: #d9004c;
            box-shadow: 0 0 30px black;
            display: inline-block;
            transform: rotate(-2deg);
        }

        input {
            margin: 10px;
            padding: 10px;
            border: 3px solid #ff0038;
            background-color: #ff9999;
            color: #e32636;
            font-size: 18px;
        }

        button {
            padding: 15px;
            background-color: red;
            color: #ff6347;
            font-size: 20px;
            border: 4px dotted black;
            cursor: pointer;
        }

        button:hover {
            background-color: black;
            color: white;
            transform: scale(1.2) rotate(10deg);
        }

        .form-container {
            display: none;
        }

        h1 {
            font-size: 50px;
            text-shadow: 5px 5px #cd5c5c;
        }

        marquee {
            color: white;
        }

        footer {
            background-color: #f1f1f1;
            text-align: center;
            padding: 10px;
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
        }
        @keyframes villog {
            0% { background-color: red; }
            50% { background-color: #ff0028; }
            100% { background-color: #560319; }
        }
    </style>
    <h1>Regisztráció</h1>
    <div class="doboz">
        <form style="background-color: #ff6347; padding: 20px;">
            <p>🏤🙋‍♂️ ÜDVÜZLÜNK A BLÁTHY FÓRUMON! 🙋‍♂️🏤 </p>
            <p>💀 Regisztráció a pokolba 💀</p>
            <input type="text" placeholder="👤 Teljes Nevedv"><br>
            <input type="text" placeholder="👤Felhasználónév"><br>
            <input type="password" placeholder="🤐Jelszó"><br>
            <input type="password" placeholder="🤐Jelszó újra"><br>
            <button onclick="alert('Gratulálok, sikeresen regisztráltál a pokolba! Gratulálok! 😭😭😭')">Regisztráció</button><br><br>
            <a href="index.html">Bejelentkezás</a>
        </form>
    </div>
    <marquee scrollamount="20">🔥EZ AZ OLDAL A LEGJOBB OLDAL!4!4!🔥</marquee>
    <footer>
        <p>Készítette: Csontos Kincső Anasztázia 13/K - "Legrosszabb UI verseny"</p>
    </footer>
</body>
